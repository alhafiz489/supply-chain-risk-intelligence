services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: supplyguard-libretranslate
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_REQ_LIMIT: 120
      LT_BATCH_LIMIT: 100
      LT_UPDATE_MODELS: "true"
      LT_LOAD_ONLY: "en,id,ja,ar,zh"
    volumes:
      # Mount seluruh .local agar ownership bawaan image disalin ke volume.
      - libretranslate_data:/home/libretranslate/.local:rw
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          ./venv/bin/python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 10m

volumes:
  libretranslate_data:
